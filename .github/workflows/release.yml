name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.0). If empty, builds from HEAD."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-vsix:
    name: Build companion .vsix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: companion-extension
        run: npm install

      - name: Build and package
        working-directory: companion-extension
        run: |
          npm run build:prod
          npx -y @vscode/vsce package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-vsix
          path: companion-extension/*.vsix
          if-no-files-found: error

      - name: Attach .vsix to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: companion-extension/*.vsix
          fail_on_unmatched_files: true

  python-tests:
    name: Verify Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pytest -q
